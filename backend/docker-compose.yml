services:
  backend:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ubnd_reports}
      QDRANT_URL: http://qdrant:6333
      OPERATIONAL_STORAGE_DIR: /app/storage/operational_reports
      REPORT_OUTPUT_DIR: /app/storage/generated_reports
      KNOWLEDGE_BASE_STORAGE_DIR: /app/storage/knowledge_base
      KNOWLEDGE_BASE_ORIGINAL_DIR: /app/storage/knowledge_base/originals
      KNOWLEDGE_BASE_PROCESSED_DIR: /app/storage/knowledge_base/processed
      KNOWLEDGE_BASE_FAILED_DIR: /app/storage/knowledge_base/failed
      FPT_API_KEY: ${FPT_API_KEY:-}
      FPT_BASE_URL: ${FPT_BASE_URL:-}
      LLM_ENABLED: "false"
      AGENT_ENABLE_PRODUCTION_ORCHESTRATION: "false"
      PYTHONIOENCODING: utf-8
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ubnd_reports}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ubnd_reports}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/6333'"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  backend_storage:
  postgres_data:
  qdrant_data:
